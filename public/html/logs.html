<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Logs - Estoque e Vendas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4">
    <h1 class="h3 mb-3">Logs do Sistema</h1>

    <div class="card shadow mb-4">
      <div class="card-body">
        <h2 class="h5">Filtros</h2>

        <div class="row">
          <div class="col-md-2 mb-3"><label class="form-label">Ação</label><input id="acao" class="form-control" placeholder="LOGIN"></div>
          <div class="col-md-2 mb-3"><label class="form-label">Método</label><input id="metodo" class="form-control" placeholder="POST"></div>
          <div class="col-md-2 mb-3"><label class="form-label">Status</label><input id="status_code" class="form-control" placeholder="200"></div>
          <div class="col-md-2 mb-3"><label class="form-label">ID Usuário</label><input id="id_usuario" class="form-control" placeholder="1"></div>
          <div class="col-md-2 mb-3"><label class="form-label">Data início</label><input id="data_inicio" type="date" class="form-control"></div>
          <div class="col-md-2 mb-3"><label class="form-label">Data fim</label><input id="data_fim" type="date" class="form-control"></div>
        </div>

        <div class="d-flex gap-2">
          <button id="btnListar" class="btn btn-primary">Listar Logs</button>
          <button id="btnExportar" class="btn btn-success">Exportar XML</button>
          <button id="btnLimpar" class="btn btn-secondary">Limpar Filtros</button>
        </div>

        <button id="btnToggleJson" class="btn btn-sm btn-outline-dark mt-2">Mostrar JSON</button>
    <pre id="resposta" class="mt-3 bg-dark text-white p-3 rounded small"></pre>
      </div>
    </div>

    <div class="card shadow">
      <div class="card-body">
        <h2 class="h5">Lista de Logs</h2>
        <div class="table-responsive">
          <table class="table table-striped table-bordered align-middle">
            <thead>
              <tr><th>Data</th><th>Ação</th><th>Método</th><th>Endpoint</th><th>Status</th><th>Usuário</th></tr>
            </thead>
            <tbody id="tabelaLogs"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (exigirLogin()) {
      montarNavbar('logs');
      configurarPainelJson('btnToggleJson', 'resposta');
    }

    const resposta = document.getElementById('resposta');
    const tabelaLogs = document.getElementById('tabelaLogs');

    function montarQueryString() {
      const params = new URLSearchParams();
      ['acao', 'metodo', 'status_code', 'id_usuario', 'data_inicio', 'data_fim'].forEach((campo) => {
        const valor = document.getElementById(campo).value;
        if (valor) params.append(campo, valor);
      });
      const query = params.toString();
      return query ? `?${query}` : '';
    }

    async function listarLogs() {
      const response = await fetch(`/api/logs${montarQueryString()}`, {
        headers: montarHeaderAutorizacao()
      });

      const json = await response.json();
      mostrarJson('resposta', json);
      tabelaLogs.innerHTML = '';

      if (!json.success) return;

      json.data.forEach((log) => {
        const tr = document.createElement('tr');
        const usuario = log.usuario && log.usuario.email ? log.usuario.email : '';

        tr.innerHTML = `
          <td>${log.criado_em || ''}</td>
          <td>${log.acao || ''}</td>
          <td>${log.metodo || ''}</td>
          <td>${log.endpoint || ''}</td>
          <td>${log.status_code || ''}</td>
          <td>${usuario}</td>
        `;

        tabelaLogs.appendChild(tr);
      });
    }

    function exportarXml() {
      fetch(`/api/logs/export/xml${montarQueryString()}`, {
        headers: montarHeaderAutorizacao()
      })
        .then(async (response) => {
          if (!response.ok) throw new Error(await response.text());
          return response.blob();
        })
        .then((blob) => {
          const link = document.createElement('a');
          const objectUrl = URL.createObjectURL(blob);
          link.href = objectUrl;
          link.download = 'logs.xml';
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(objectUrl);
          resposta.textContent = 'Arquivo XML gerado com sucesso.';
        })
        .catch((error) => resposta.textContent = error.message);
    }

    function limparFiltros() {
      ['acao', 'metodo', 'status_code', 'id_usuario', 'data_inicio', 'data_fim'].forEach((campo) => {
        document.getElementById(campo).value = '';
      });
    }

    document.getElementById('btnListar').addEventListener('click', listarLogs);
    document.getElementById('btnExportar').addEventListener('click', exportarXml);
    document.getElementById('btnLimpar').addEventListener('click', limparFiltros);
    listarLogs();
  </script>
</body>
</html>
