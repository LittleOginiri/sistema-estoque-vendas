<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Estoque e Vendas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body">
            <h1 class="h4 mb-3">Login</h1>

            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input id="email" class="form-control" value="admin@admin.com">
            </div>

            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input id="senha" type="password" class="form-control" value="123456">
            </div>

            <button id="btnLogin" class="btn btn-primary w-100">Entrar</button>

            <a href="/produtos" class="btn btn-outline-secondary w-100 mt-2">Ir para Produtos</a>

            <pre id="resposta" class="mt-3 bg-dark text-white p-3 rounded small"></pre>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnLogin = document.getElementById('btnLogin');
      const resposta = document.getElementById('resposta');

      btnLogin.addEventListener('click', async () => {
        resposta.textContent = 'Carregando...';

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
          });

          const json = await response.json();
          resposta.textContent = JSON.stringify(json, null, 2);

          if (json.success && json.data && json.data.token) {
            localStorage.setItem('token', json.data.token);
          }
        } catch (error) {
          resposta.textContent = error.message;
        }
      });
    });
  </script>
</body>
</html>
