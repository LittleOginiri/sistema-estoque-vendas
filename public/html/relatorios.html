<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios - Estoque e Vendas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4">
    <h1 class="h3 mb-3">Relatórios</h1>

    <div class="card shadow mb-4">
      <div class="card-body">
        <h2 class="h5">Relatório de Vendas</h2>

        <div class="row align-items-end">
          <div class="col-md-3 mb-3">
            <label class="form-label">Data início</label>
            <input id="data_inicio" type="date" class="form-control">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Data fim</label>
            <input id="data_fim" type="date" class="form-control">
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Status</label>
            <select id="status" class="form-select">
              <option value="">Todos</option>
              <option value="FINALIZADA">FINALIZADA</option>
              <option value="CANCELADA">CANCELADA</option>
              <option value="ABERTA">ABERTA</option>
            </select>
          </div>

          <div class="col-md-3 mb-3 d-flex gap-2">
            <button id="btnConsultar" class="btn btn-primary">Consultar</button>
            <button id="btnPdf" class="btn btn-success">Baixar PDF</button>
          </div>
        </div>

        <button id="btnToggleJson" class="btn btn-sm btn-outline-dark mt-2">Mostrar JSON</button>
    <pre id="resposta" class="mt-3 bg-dark text-white p-3 rounded small"></pre>
      </div>
    </div>

    <div class="card shadow mb-4">
      <div class="card-body">
        <h2 class="h5">Resumo</h2>
        <p><strong>Quantidade de vendas:</strong> <span id="qtdVendas">0</span></p>
        <p><strong>Total geral:</strong> R$ <span id="totalGeral">0.00</span></p>
      </div>
    </div>

    <div class="card shadow">
      <div class="card-body">
        <h2 class="h5">Vendas</h2>
        <div class="table-responsive">
          <table class="table table-striped table-bordered align-middle">
            <thead>
              <tr><th>ID</th><th>Cliente</th><th>Usuário</th><th>Total</th><th>Status</th><th>Data</th></tr>
            </thead>
            <tbody id="tabelaVendas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (exigirLogin()) {
      montarNavbar('relatorios');
      configurarPainelJson('btnToggleJson', 'resposta');
    }

    const resposta = document.getElementById('resposta');
    const tabelaVendas = document.getElementById('tabelaVendas');

    function montarQueryString() {
      const params = new URLSearchParams();
      const dataInicio = document.getElementById('data_inicio').value;
      const dataFim = document.getElementById('data_fim').value;
      const status = document.getElementById('status').value;

      if (dataInicio) params.append('data_inicio', dataInicio);
      if (dataFim) params.append('data_fim', dataFim);
      if (status) params.append('status', status);

      const query = params.toString();
      return query ? `?${query}` : '';
    }

    async function consultarRelatorio() {
      const response = await fetch(`/api/relatorios/vendas${montarQueryString()}`, {
        headers: montarHeaderAutorizacao()
      });

      const json = await response.json();
      mostrarJson('resposta', json);
      tabelaVendas.innerHTML = '';

      if (!json.success) return;

      const dados = json.data;
      document.getElementById('qtdVendas').textContent = dados.resumo.quantidade_vendas;
      document.getElementById('totalGeral').textContent = Number(dados.resumo.total_geral).toFixed(2);

      dados.vendas.forEach((venda) => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${venda.id_venda}</td>
          <td>${venda.cliente}</td>
          <td>${venda.usuario}</td>
          <td>R$ ${venda.total}</td>
          <td>${venda.status}</td>
          <td>${venda.data_venda}</td>
        `;

        tabelaVendas.appendChild(tr);
      });
    }

    async function baixarPdf() {
      const response = await fetch(`/api/relatorios/vendas/pdf${montarQueryString()}`, {
        headers: montarHeaderAutorizacao()
      });

      if (!response.ok) {
        resposta.textContent = await response.text();
        return;
      }

      const blob = await response.blob();
      const link = document.createElement('a');
      const objectUrl = URL.createObjectURL(blob);

      link.href = objectUrl;
      link.download = 'relatorio_vendas.pdf';
      document.body.appendChild(link);
      link.click();
      link.remove();

      URL.revokeObjectURL(objectUrl);
      resposta.textContent = 'PDF gerado com sucesso.';
    }

    document.getElementById('btnConsultar').addEventListener('click', consultarRelatorio);
    document.getElementById('btnPdf').addEventListener('click', baixarPdf);
    consultarRelatorio();
  </script>
</body>
</html>
