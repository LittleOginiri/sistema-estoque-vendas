<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Estoque e Vendas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4">
    <h1 class="h3 mb-3">Clientes</h1>

    <div class="card shadow mb-4">
      <div class="card-body">
        <h2 class="h5">Cadastro / edição</h2>
        <p class="text-muted small">Campos com <span class="text-danger">*</span> são obrigatórios.</p>

        <input id="idRegistro" type="hidden">

        <div class="row">
          
          <div class="col-md-4 mb-3">
            <label class="form-label">Nome do cliente <span class="text-danger">*</span></label>
            <input id="nome" class="form-control" placeholder="Ex: João Silva">
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">E-mail </label>
            <input id="email" class="form-control" placeholder="Ex: joao@email.com">
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Telefone </label>
            <input id="telefone" class="form-control" placeholder="Ex: (12) 99999-1111">
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">CPF </label>
            <input id="cpf" class="form-control" placeholder="Ex: 111.111.111-11">
          </div>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <button id="btnSalvar" class="btn btn-success">Salvar</button>
          <button id="btnLimpar" class="btn btn-secondary">Limpar</button>
          <button id="btnListar" class="btn btn-primary">Listar</button>
        </div>

        <div id="feedback" class="alert alert-info mt-3 d-none"></div>

        <button id="btnToggleJson" class="btn btn-sm btn-outline-dark mt-2">Mostrar JSON</button>
        <pre id="resposta" class="mt-2 bg-dark text-white p-3 rounded small"></pre>
      </div>
    </div>

    <div class="card shadow">
      <div class="card-body">
        <h2 class="h5">Lista</h2>
        <div class="table-responsive">
          <table class="table table-striped table-bordered align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome do cliente</th>
<th>E-mail</th>
<th>Telefone</th>
<th>CPF</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (exigirLogin()) {
      montarNavbar('clientes');
    }

    configurarPainelJson('btnToggleJson', 'resposta');

    const apiBase = '/api/clientes';
    const fields = ["nome", "email", "telefone", "cpf"];
    const requiredFields = ["nome"];
    const resposta = document.getElementById('resposta');
    const tabela = document.getElementById('tabela');

    function feedback(texto, tipo = 'info') {
      const div = document.getElementById('feedback');
      div.className = `alert alert-${tipo} mt-3`;
      div.textContent = texto;
    }

    function getIdCampo(item) {
      return item.id_produto || item.id_cliente || item.id_categoria || item.id_usuario;
    }

    function limparFormulario() {
      document.getElementById('idRegistro').value = '';
      fields.forEach(campo => document.getElementById(campo).value = '');
      feedback('Formulário limpo.', 'secondary');
    }

    function montarObjeto() {
      const obj = {};

      fields.forEach(campo => {
        let valor = document.getElementById(campo).value;

        if (['preco'].includes(campo)) valor = Number(valor);
        if (['estoque', 'id_categoria'].includes(campo)) valor = Number.parseInt(valor);

        obj[campo] = valor;
      });

      return obj;
    }

    function validarFormulario() {
      for (const campo of requiredFields) {
        const valor = document.getElementById(campo).value;
        if (!valor) {
          feedback(`Preencha o campo obrigatório: ${campo}.`, 'warning');
          return false;
        }
      }

      return true;
    }

    async function listar() {
      const response = await fetch(apiBase, { headers: montarHeaderAutorizacao() });
      const json = await response.json();
      mostrarJson('resposta', json);
      tabela.innerHTML = '';

      if (!json.success) {
        feedback(json.message || 'Erro ao listar registros.', 'danger');
        return;
      }

      json.data.forEach(item => {
        const id = getIdCampo(item);
        const tr = document.createElement('tr');

        let linhas = `<td>${id}</td>`;

        fields.forEach(campo => {
          linhas += `<td>${item[campo] ?? ''}</td>`;
        });

        linhas += `
          <td>
            <button class="btn btn-sm btn-info" onclick='editar(${JSON.stringify(item)})'>Editar</button>
            <button class="btn btn-sm btn-danger" onclick="remover(${id})">Excluir</button>
          </td>
        `;

        tr.innerHTML = linhas;
        tabela.appendChild(tr);
      });

      feedback(`${json.data.length} registro(s) carregado(s).`, 'success');
    }

    function editar(item) {
      document.getElementById('idRegistro').value = getIdCampo(item);
      fields.forEach(campo => document.getElementById(campo).value = item[campo] ?? '');
      feedback('Registro carregado para edição.', 'info');
    }

    async function salvar() {
      if (!validarFormulario()) return;

      const id = document.getElementById('idRegistro').value;
      const method = id ? 'PUT' : 'POST';
      const url = id ? `${apiBase}/${id}` : apiBase;

      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', ...montarHeaderAutorizacao() },
        body: JSON.stringify(montarObjeto())
      });

      const json = await response.json();
      mostrarJson('resposta', json);

      if (json.success) {
        feedback(id ? 'Registro atualizado com sucesso.' : 'Registro cadastrado com sucesso.', 'success');
        limparFormulario();
        listar();
      } else {
        feedback(json.message || 'Erro ao salvar registro.', 'danger');
      }
    }

    async function remover(id) {
      if (!confirm('Deseja realmente excluir este registro?')) return;

      const response = await fetch(`${apiBase}/${id}`, {
        method: 'DELETE',
        headers: montarHeaderAutorizacao()
      });

      const json = await response.json();
      mostrarJson('resposta', json);

      if (json.success) {
        feedback('Registro excluído com sucesso.', 'success');
        listar();
      } else {
        feedback(json.message || 'Erro ao excluir registro.', 'danger');
      }
    }

    document.getElementById('btnSalvar').addEventListener('click', salvar);
    document.getElementById('btnLimpar').addEventListener('click', limparFormulario);
    document.getElementById('btnListar').addEventListener('click', listar);

    listar();
  </script>
</body>
</html>
